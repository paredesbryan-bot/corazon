<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MI CORAZON ES TUYO</title>

<style>

#stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:50;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation: blink 2s infinite;
}
@keyframes blink{
    0%,100%{
        opacity:.2;
    }
    50%{
        opacity:1;
    }
}

.frase{
    position:absolute;
    color:white;
    font-size:14px;
    font-family:'Segoe UI',sans-serif;
    text-shadow:
        0 0 5px #00d4ff,
        0 0 10px #00d4ff;
    pointer-events:none;
    z-index:90;
    opacity:0;
    animation: aparecer 8s linear forwards;
}

@keyframes aparecer{
    0%{
        opacity:0;
        transform:translateY(15px);
    }

    15%{
        opacity:1;
    }

    85%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translateY(-15px);
    }
}
canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,.2);
}

html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
}
</style>

</head>

<body>

<canvas id="heart"></canvas>

<div id="stars"></div>

<script>

const mensajes = [
    "Te amo mi vida 💙",
    "Gracias por existir mi niña ✨",
    "Tu sonrisa ilumina mi vida 🌙",
    "Nunca cambies 💫",
    "Eres increíble, divertida y bella corazon 💙",
    "Te deseo lo mejor desde lo màs profundo de mi corazòn ✨",
    "Sigue brillando e ilumina a màs personas mi reina 🌟",
    "Todo te irá bien mi amor 💙"
];

for(let i = 0; i < 150; i++){

    const star = document.createElement("div");

    star.className = "star";

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";
    star.style.animationDelay = Math.random() * 2 + "s";

    document
        .getElementById("stars")
        .appendChild(star);
}

function crearFrase(){

    const frase =
        document.createElement("div");

    frase.className = "frase";

    frase.innerText =
        mensajes[
            Math.floor(
                Math.random() *
                mensajes.length
            )
        ];

    const centroX = window.innerWidth / 2;
    const centroY = window.innerHeight / 2;

    const angulo =
        Math.random() * Math.PI * 2;

    const radio =
        300 + Math.random() * 100;
    frase.style.left =
        centroX +
        Math.cos(angulo) * radio +
        "px";

    frase.style.top =
        centroY +
        Math.sin(angulo) * radio +
        "px";

    document.body.appendChild(frase);

    setTimeout(() => {
        frase.remove();
    }, 8000);
}

crearFrase();

setInterval(
    crearFrase,
    1200
);

</script>

<script>

window.requestAnimationFrame =
    window.requestAnimationFrame ||
    window.webkitRequestAnimationFrame ||
    window.mozRequestAnimationFrame ||
    window.oRequestAnimationFrame ||
    window.msRequestAnimationFrame ||
    (function () {

        return function (callback, element) {

            var lastTime =
                element ? element.__lastTime : undefined;

            if (lastTime === undefined) {
                lastTime = 0;
            }

            var currTime = Date.now();

            var timeToCall =
                Math.max(1, 33 - (currTime - lastTime));

            window.setTimeout(function () {
                callback(currTime + timeToCall);
            }, timeToCall);

            if (element) {
                element.__lastTime =
                    currTime + timeToCall;
            }

        };

    })();

var mobile =
    /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i
    .test(navigator.userAgent);

var koef = mobile ? 0.5 : 1;

var canvas = document.getElementById("heart");
var ctx = canvas.getContext("2d");

var width =
    canvas.width =
    koef * window.innerWidth;

var height =
    canvas.height =
    koef * window.innerHeight;

var rand = Math.random;

ctx.fillStyle = "rgba(0,10,25,.08)";
ctx.fillRect(0, 0, width, height);

var heartPosition = function (rad) {

    return [
        Math.pow(Math.sin(rad), 3),

        -(
            15 * Math.cos(rad)
            - 5 * Math.cos(2 * rad)
            - 2 * Math.cos(3 * rad)
            - Math.cos(4 * rad)
        )
    ];

};

var scaleAndTranslate =
    function (pos, sx, sy, dx, dy) {

        return [
            dx + pos[0] * sx,
            dy + pos[1] * sy
        ];

    };

window.addEventListener("resize", function () {

    width =
        canvas.width =
        koef * window.innerWidth;

    height =
        canvas.height =
        koef * window.innerHeight;

    ctx.fillStyle = "rgba(0,0,0,1)";
    ctx.fillRect(0, 0, width, height);

});

var traceCount = mobile ? 20 : 50;

var pointsOrigin = [];

var i;

var dr = mobile ? 0.3 : 0.1;

for (i = 0; i < Math.PI * 2; i += dr)
    pointsOrigin.push(
        scaleAndTranslate(
            heartPosition(i),
            210,
            13,
            0,
            0
        )
    );

for (i = 0; i < Math.PI * 2; i += dr)
    pointsOrigin.push(
        scaleAndTranslate(
            heartPosition(i),
            150,
            9,
            0,
            0
        )
    );

for (i = 0; i < Math.PI * 2; i += dr)
    pointsOrigin.push(
        scaleAndTranslate(
            heartPosition(i),
            90,
            5,
            0,
            0
        )
    );

var heartPointsCount =
    pointsOrigin.length;

var targetPoints = [];

var pulse = function (kx, ky) {

    for (
        i = 0;
        i < pointsOrigin.length;
        i++
    ) {

        targetPoints[i] = [];

        targetPoints[i][0] =
            kx * pointsOrigin[i][0] +
            width / 2;

        targetPoints[i][1] =
            ky * pointsOrigin[i][1] +
            height / 2;
    }

};

var e = [];

for (
    i = 0;
    i < heartPointsCount;
    i++
) {

    var x = rand() * width;
    var y = rand() * height;

    e[i] = {

        vx: 0,
        vy: 0,

        R: 2,

        speed:
            rand() * 5 + 5,

        q:
            ~~(
                rand() *
                heartPointsCount
            ),

        D:
            2 * (i % 2) - 1,

        force:
            0.2 * rand() + 0.7,

        f:
           "hsla(" +
         (200 + rand() * 40) +
        ",100%,70%,.5)",

        trace: []

    };

    for (
        var k = 0;
        k < traceCount;
        k++
    ) {

        e[i].trace[k] = {
            x: x,
            y: y
        };

    }

}

var config = {
    traceK: 0.4,
    timeDelta: 0.01
};

var time = 0;

var loop = function () {

    var n =
        -Math.cos(time);

    pulse(
        (1 + n) * .5,
        (1 + n) * .5
    );

    time += (
        Math.sin(time) < 0
            ? 0.9
            : (n > 0.8 ? 0.2 : 1)
    ) * config.timeDelta;

    ctx.fillStyle =
        "rgba(0,0,0,.1)";

    ctx.fillRect(
        0,
        0,
        width,
        height
    );

    for (
        i = 0;
        i < e.length;
        i++
    ) {

        var u = e[i];
        var q =
            targetPoints[u.q];

        var dx =
            u.trace[0].x -
            q[0];

        var dy =
            u.trace[0].y -
            q[1];

        var length =
            Math.sqrt(
                dx * dx +
                dy * dy
            );

        if (10 > length) {

            if (
                0.95 < rand()
            ) {

                u.q =
                    ~~(
                        rand() *
                        heartPointsCount
                    );

            } else {

                if (
                    0.99 < rand()
                ) {
                    u.D *= -1;
                }

                u.q += u.D;

                u.q %=
                    heartPointsCount;

                if (
                    u.q < 0
                ) {
                    u.q +=
                        heartPointsCount;
                }

            }

        }

        u.vx +=
            -dx /
            length *
            u.speed;

        u.vy +=
            -dy /
            length *
            u.speed;

        u.trace[0].x +=
            u.vx;

        u.trace[0].y +=
            u.vy;

        u.vx *=
            u.force;

        u.vy *=
            u.force;

        for (
            var k = 0;
            k < u.trace.length - 1;
            k++
        ) {

            var T =
                u.trace[k];

            var N =
                u.trace[k + 1];

            N.x +=
                config.traceK *
                (T.x - N.x);

            N.y +=
                config.traceK *
                (T.y - N.y);

        }

        ctx.fillStyle =
            u.f;

        for (
            var k = 0;
            k < u.trace.length;
            k++
        ) {

            ctx.fillRect(
                u.trace[k].x,
                u.trace[k].y,
                1,
                1
            );

        }

    }

    window.requestAnimationFrame(
        loop,
        canvas
    );

};

loop();
</script>

</body>
</html>
